<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaForge — AI App Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-tertiary: #1a1a26;
  --bg-card: #16161f;
  --border: #2a2a3a;
  --border-hover: #3a3a50;
  --text-primary: #e8e8f0;
  --text-secondary: #8888a0;
  --text-muted: #555570;
  --accent: #00e89d;
  --accent-dim: #00c080;
  --accent-glow: rgba(0, 232, 157, 0.15);
  --accent-secondary: #ff6b4a;
  --accent-tertiary: #6b8aff;
  --danger: #ff4466;
  --warning: #ffaa22;
  --success: #00e89d;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

.mono { font-family: 'JetBrains Mono', monospace; }

.glow-line {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.5;
}

.glass {
  background: rgba(22, 22, 31, 0.8);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
}

.component-item {
  transition: all 0.2s ease;
  cursor: grab;
  user-select: none;
}
.component-item:hover {
  background: var(--bg-tertiary);
  border-color: var(--accent);
  transform: translateX(4px);
}
.component-item:active { cursor: grabbing; }

.editor-area {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.7;
  tab-size: 2;
  resize: none;
  background: transparent;
  color: var(--text-primary);
  border: none;
  outline: none;
  width: 100%;
  height: 100%;
  padding: 16px;
}

.line-numbers {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text-muted);
  padding: 16px 8px 16px 16px;
  text-align: right;
  user-select: none;
  min-width: 40px;
}

.tab-btn {
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text-primary); }
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.preview-frame {
  background: #ffffff;
  border-radius: 8px;
  overflow: hidden;
}

.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 9999px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.toast-container {
  position: fixed;
  top: 80px;
  right: 20px;
  z-index: 10000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: slideInRight 0.3s ease, fadeOut 0.3s ease 3.7s forwards;
  max-width: 360px;
  border: 1px solid var(--border);
  backdrop-filter: blur(20px);
}

@keyframes slideInRight {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
@keyframes fadeOut {
  to { transform: translateX(100%); opacity: 0; }
}

@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); }
  50% { box-shadow: 0 0 20px 4px var(--accent-glow); }
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
}

@keyframes spin-slow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.animate-pulse-glow { animation: pulse-glow 2s ease infinite; }
.animate-float { animation: float 3s ease infinite; }

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  z-index: 9000;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal-content {
  animation: scaleIn 0.25s ease;
}

@keyframes scaleIn {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  animation: pulse-dot 2s ease infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.schema-table th {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  font-weight: 600;
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

.schema-table td {
  padding: 8px 12px;
  font-size: 13px;
  border-bottom: 1px solid rgba(42,42,58,0.5);
}

.schema-table tr:hover td {
  background: rgba(0,232,157,0.03);
}

.drop-zone {
  border: 2px dashed var(--border);
  border-radius: 12px;
  transition: all 0.2s;
}
.drop-zone.drag-over {
  border-color: var(--accent);
  background: var(--accent-glow);
}

.lang-btn {
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid transparent;
}
.lang-btn.active {
  background: var(--accent);
  color: var(--bg-primary);
  border-color: var(--accent);
}
.lang-btn:not(.active) {
  color: var(--text-secondary);
  border-color: var(--border);
}
.lang-btn:not(.active):hover {
  border-color: var(--text-secondary);
  color: var(--text-primary);
}

.api-method {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 3px;
  letter-spacing: 0.5px;
}

.generated-app * { font-family: 'Space Grotesk', sans-serif; }

.resizer {
  width: 4px;
  cursor: col-resize;
  background: var(--border);
  transition: background 0.15s;
  flex-shrink: 0;
}
.resizer:hover, .resizer.active {
  background: var(--accent);
}

.notification-badge {
  position: absolute;
  top: -2px;
  right: -2px;
  width: 16px;
  height: 16px;
  background: var(--danger);
  border-radius: 50%;
  font-size: 9px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--bg-primary);
}

@media (max-width: 768px) {
  .sidebar-left { display: none !important; }
  .main-panels { flex-direction: column !important; }
  .resizer-h { display: none !important; }
  .bottom-panel { height: 200px !important; }
}
</style>
</head>
<body>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Header -->
<header class="glass" style="height:56px; position:relative; z-index:100; display:flex; align-items:center; padding:0 16px; gap:12px; border-top:none; border-left:none; border-right:none;">
  <div style="display:flex; align-items:center; gap:10px; flex-shrink:0;">
    <div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#00a070);display:flex;align-items:center;justify-content:center;">
      <i class="fas fa-cube" style="font-size:14px;color:var(--bg-primary);"></i>
    </div>
    <span style="font-weight:700;font-size:16px;letter-spacing:-0.5px;">MetaForge</span>
    <span class="badge" style="background:var(--accent-glow);color:var(--accent);">v1.0</span>
  </div>

  <div style="flex:1;"></div>

  <!-- Language Switcher -->
  <div style="display:flex;gap:4px;align-items:center;" id="langSwitcher">
    <button class="lang-btn active" data-lang="en" onclick="switchLang('en')">EN</button>
    <button class="lang-btn" data-lang="hi" onclick="switchLang('hi')">HI</button>
    <button class="lang-btn" data-lang="es" onclick="switchLang('es')">ES</button>
  </div>

  <div style="width:1px;height:24px;background:var(--border);margin:0 4px;"></div>

  <!-- Notifications -->
  <button onclick="toggleNotifications()" style="position:relative;background:none;border:none;color:var(--text-secondary);cursor:pointer;padding:6px;border-radius:6px;transition:all 0.15s;" onmouseover="this.style.color='var(--text-primary)';this.style.background='var(--bg-tertiary)'" onmouseout="this.style.color='var(--text-secondary)';this.style.background='none'">
    <i class="fas fa-bell" style="font-size:15px;"></i>
    <span class="notification-badge" id="notifBadge">3</span>
  </button>

  <!-- CSV Import -->
  <button onclick="openCSVModal()" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;padding:6px;border-radius:6px;transition:all 0.15s;" onmouseover="this.style.color='var(--text-primary)';this.style.background='var(--bg-tertiary)'" onmouseout="this.style.color='var(--text-secondary)';this.style.background='none'">
    <i class="fas fa-file-csv" style="font-size:15px;"></i>
  </button>

  <!-- Deploy -->
  <button onclick="deployApp()" style="display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;background:var(--accent);color:var(--bg-primary);font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all 0.15s;" onmouseover="this.style.background='#00ffaa'" onmouseout="this.style.background='var(--accent)'">
    <i class="fas fa-rocket" style="font-size:11px;"></i>
    <span data-i18n="deploy">Deploy</span>
  </button>

  <!-- Auth -->
  <div style="display:flex;align-items:center;gap:8px;padding-left:8px;border-left:1px solid var(--border);margin-left:4px;">
    <div style="width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent-tertiary),#4466dd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;" onclick="toggleAuthModal()">U</div>
  </div>
</header>

<div class="glow-line"></div>

<!-- Main Layout -->
<div style="display:flex; height:calc(100vh - 57px);">

  <!-- Left Sidebar: Components -->
  <aside class="sidebar-left" style="width:220px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg-secondary);overflow:hidden;">
    <div style="padding:12px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);border-bottom:1px solid var(--border);">
      <i class="fas fa-puzzle-piece" style="margin-right:6px;"></i><span data-i18n="components">Components</span>
    </div>
    <div style="flex:1;overflow-y:auto;padding:8px;" id="componentPalette">
      <div style="padding:4px 8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-top:4px;">Layout</div>
      <div class="component-item" draggable="true" data-type="page" style="padding:8px 10px;border-radius:6px;border:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-file" style="color:var(--accent-tertiary);font-size:12px;width:16px;text-align:center;"></i>
        <span style="font-size:13px;">Page</span>
      </div>
      <div class="component-item" draggable="true" data-type="container" style="padding:8px 10px;border-radius:6px;border:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-square" style="color:var(--accent-tertiary);font-size:12px;width:16px;text-align:center;"></i>
        <span style="font-size:13px;">Container</span>
      </div>
      <div class="component-item" draggable="true" data-type="columns" style="padding:8px 10px;border-radius:6px;border:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-columns" style="color:var(--accent-tertiary);font-size:12px;width:16px;text-align:center;"></i>
        <span style="font-size:13px;">Columns</span>
      </div>

      <div style="padding:4px 8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-top:8px;">Data</div>
      <div class="component-item" draggable="true" data-type="table" style="padding:8px 10px;border-radius:6px;border:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-table" style="color:var(--accent);font-size:12px;width:16px;text-align:center;"></i>
        <span style="font-size:13px;">Table</span>
      </div>
      <div class="component-item" draggable="true" data-type="list" style="padding:8px 10px;border-radius:6px;border:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-list" style="color:var(--accent);font-size:12px;width:16px;text-align:center;"></i>
        <span style="font-size:13px;">List</span>
      </div>
      <div class="component-item" draggable="true" data-type="card" style="padding:8px 10px;border-radius:6px;border:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-id-card" style="color:var(--accent);font-size:12px;width:16px;text-align:center;"></i>
        <span style="font-size:13px;">Card</span>
      </div>

      <div style="padding:4px 8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-top:8px;">Input</div>
      <div class="component-item" draggable="true" data-type="form" style="padding:8px 10px;border-radius:6px;border:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-wpforms" style="color:var(--accent-secondary);font-size:12px;width:16px;text-align:center;"></i>
        <span style="font-size:13px;">Form</span>
      </div>
      <div class="component-item" draggable="true" data-type="button" style="padding:8px 10px;border-radius:6px;border:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-hand-pointer" style="color:var(--accent-secondary);font-size:12px;width:16px;text-align:center;"></i>
        <span style="font-size:13px;">Button</span>
      </div>
      <div class="component-item" draggable="true" data-type="input" style="padding:8px 10px;border-radius:6px;border:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-keyboard" style="color:var(--accent-secondary);font-size:12px;width:16px;text-align:center;"></i>
        <span style="font-size:13px;">Input Field</span>
      </div>

      <div style="padding:4px 8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-top:8px;">Display</div>
      <div class="component-item" draggable="true" data-type="heading" style="padding:8px 10px;border-radius:6px;border:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-heading" style="color:var(--warning);font-size:12px;width:16px;text-align:center;"></i>
        <span style="font-size:13px;">Heading</span>
      </div>
      <div class="component-item" draggable="true" data-type="text" style="padding:8px 10px;border-radius:6px;border:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-align-left" style="color:var(--warning);font-size:12px;width:16px;text-align:center;"></i>
        <span style="font-size:13px;">Text</span>
      </div>
      <div class="component-item" draggable="true" data-type="image" style="padding:8px 10px;border-radius:6px;border:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-image" style="color:var(--warning);font-size:12px;width:16px;text-align:center;"></i>
        <span style="font-size:13px;">Image</span>
      </div>
      <div class="component-item" draggable="true" data-type="chart" style="padding:8px 10px;border-radius:6px;border:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-chart-bar" style="color:var(--warning);font-size:12px;width:16px;text-align:center;"></i>
        <span style="font-size:13px;">Chart</span>
      </div>

      <div style="padding:4px 8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-top:8px;">Navigation</div>
      <div class="component-item" draggable="true" data-type="navbar" style="padding:8px 10px;border-radius:6px;border:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-bars" style="color:#c084fc;font-size:12px;width:16px;text-align:center;"></i>
        <span style="font-size:13px;">Navbar</span>
      </div>
      <div class="component-item" draggable="true" data-type="tabs" style="padding:8px 10px;border-radius:6px;border:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-folder" style="color:#c084fc;font-size:12px;width:16px;text-align:center;"></i>
        <span style="font-size:13px;">Tabs</span>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">

    <!-- Editor Tabs -->
    <div style="display:flex;align-items:center;border-bottom:1px solid var(--border);background:var(--bg-secondary);padding:0 12px;gap:0;overflow-x:auto;flex-shrink:0;">
      <button class="tab-btn active" data-tab="editor" onclick="switchTab('editor')">
        <i class="fas fa-code" style="margin-right:6px;font-size:11px;"></i><span data-i18n="jsonConfig">JSON Config</span>
      </button>
      <button class="tab-btn" data-tab="preview" onclick="switchTab('preview')">
        <i class="fas fa-eye" style="margin-right:6px;font-size:11px;"></i><span data-i18n="preview">Preview</span>
      </button>
      <button class="tab-btn" data-tab="api" onclick="switchTab('api')">
        <i class="fas fa-plug" style="margin-right:6px;font-size:11px;"></i><span data-i18n="apiEndpoints">API Endpoints</span>
      </button>
      <button class="tab-btn" data-tab="database" onclick="switchTab('database')">
        <i class="fas fa-database" style="margin-right:6px;font-size:11px;"></i><span data-i18n="databaseSchema">Database Schema</span>
      </button>
      <button class="tab-btn" data-tab="workflows" onclick="switchTab('workflows')">
        <i class="fas fa-sitemap" style="margin-right:6px;font-size:11px;"></i><span data-i18n="workflows">Workflows</span>
      </button>
      <div style="flex:1;"></div>
      <div style="display:flex;align-items:center;gap:6px;padding:6px 0;">
        <div class="status-dot" style="background:var(--accent);"></div>
        <span style="font-size:11px;color:var(--text-muted);" id="statusText">Ready</span>
      </div>
    </div>

    <!-- Tab Content -->
    <div style="flex:1;position:relative;overflow:hidden;">

      <!-- Editor Tab -->
      <div id="tab-editor" style="position:absolute;inset:0;display:flex;">
        <div class="line-numbers" id="lineNumbers">1</div>
        <textarea class="editor-area" id="jsonEditor" spellcheck="false"></textarea>
      </div>

      <!-- Preview Tab -->
      <div id="tab-preview" style="position:absolute;inset:0;display:none;background:var(--bg-tertiary);padding:20px;overflow:auto;">
        <div class="preview-frame" style="max-width:960px;margin:0 auto;min-height:500px;box-shadow:0 20px 60px rgba(0,0,0,0.5);" id="previewFrame"></div>
      </div>

      <!-- API Tab -->
      <div id="tab-api" style="position:absolute;inset:0;display:none;overflow:auto;padding:20px;" id="apiContent"></div>

      <!-- Database Tab -->
      <div id="tab-database" style="position:absolute;inset:0;display:none;overflow:auto;padding:20px;" id="dbContent"></div>

      <!-- Workflows Tab -->
      <div id="tab-workflows" style="position:absolute;inset:0;display:none;overflow:auto;padding:20px;" id="wfContent"></div>

    </div>

    <!-- Bottom Status Bar -->
    <div style="height:32px;border-top:1px solid var(--border);background:var(--bg-secondary);display:flex;align-items:center;padding:0 12px;gap:16px;flex-shrink:0;">
      <span style="font-size:11px;color:var(--text-muted);">
        <i class="fas fa-circle" style="font-size:6px;color:var(--accent);margin-right:4px;"></i>
        <span data-i18n="connected">Connected</span>
      </span>
      <span style="font-size:11px;color:var(--text-muted);" id="entityCount">Entities: 0</span>
      <span style="font-size:11px;color:var(--text-muted);" id="apiCount">APIs: 0</span>
      <span style="font-size:11px;color:var(--text-muted);" id="validationStatus">
        <i class="fas fa-check-circle" style="color:var(--accent);margin-right:3px;"></i>Valid
      </span>
      <div style="flex:1;"></div>
      <span style="font-size:11px;color:var(--text-muted);">MetaForge Runtime v1.0</span>
    </div>
  </div>
</div>

<!-- Notifications Panel -->

// =============================================

function showToast(type, message) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  const colors = {
    success: { bg: 'rgba(0,232,157,0.1)', border: 'rgba(0,232,157,0.3)', icon: 'fa-check-circle', color: '#00e89d' },
    error: { bg: 'rgba(255,68,102,0.1)', border: 'rgba(255,68,102,0.3)', icon: 'fa-times-circle', color: '#ff4466' },
    warning: { bg: 'rgba(255,170,34,0.1)', border: 'rgba(255,170,34,0.3)', icon: 'fa-exclamation-triangle', color: '#ffaa22' },
    info: { bg: 'rgba(107,138,255,0.1)', border: 'rgba(107,138,255,0.3)', icon: 'fa-info-circle', color: '#6b8aff' }
  };
  const c = colors[type] || colors.info;
  toast.className = 'toast';
  toast.style.background = c.bg;
  toast.style.borderColor = c.border;
  toast.innerHTML = `<i class="fas ${c.icon}" style="color:${c.color};font-size:15px;"></i><span style="color:var(--text-primary);">${message}</span>`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

// =============================================
// NOTIFICATION PANEL
// =============================================
function addNotification(type, message) {
  notifications.unshift({ type, message, time: new Date() });
  notifCount++;
  document.getElementById('notifBadge').textContent = notifCount;
  document.getElementById('notifBadge').style.display = 'flex';
  renderNotifications();
}

function renderNotifications() {
  const list = document.getElementById('notifList');
  if (notifications.length === 0) {
    list.innerHTML = `<div style="padding:40px 20px;text-align:center;color:var(--text-muted);font-size:13px;">${t('noNotifs')}</div>`;
    return;
  }
  const icons = { success: 'fa-check-circle', error: 'fa-times-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
  const colors = { success: '#00e89d', error: '#ff4466', warning: '#ffaa22', info: '#6b8aff' };
  list.innerHTML = notifications.map(n => {
    const timeAgo = getTimeAgo(n.time);
    return `<div style="padding:12px 16px;border-bottom:1px solid rgba(42,42,58,0.5);display:flex;gap:10px;align-items:flex-start;">
      <i class="fas ${icons[n.type]||icons.info}" style="color:${colors[n.type]||colors.info};margin-top:2px;font-size:13px;"></i>
      <div style="flex:1;">
        <div style="font-size:13px;color:var(--text-primary);line-height:1.4;">${n.message}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:3px;">${timeAgo}</div>
      </div>
    </div>`;
  }).join('');
}

function getTimeAgo(date) {
  const s = Math.floor((new Date() - date) / 1000);
  if (s < 5) return currentLang === 'hi' ? 'अभी' : currentLang === 'es' ? 'Ahora' : 'Just now';
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  return `${Math.floor(s/3600)}h ago`;
}

function toggleNotifications() {
  const panel = document.getElementById('notifPanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  if (panel.style.display === 'block') {
    notifCount = 0;
    document.getElementById('notifBadge').style.display = 'none';
  }
}

function clearNotifications() {
  notifications = [];
  renderNotifications();
}

// =============================================
// JSON EDITOR
// =============================================
const editor = document.getElementById('jsonEditor');
const lineNumbers = document.getElementById('lineNumbers');

editor.value = JSON.stringify(defaultConfig, null, 2);
updateLineNumbers();
validateAndUpdate();

editor.addEventListener('input', () => {
  updateLineNumbers();
  validateAndUpdate();
});

editor.addEventListener('scroll', () => {
  lineNumbers.scrollTop = editor.scrollTop;
});

editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + 2;
    updateLineNumbers();
  }
});

function updateLineNumbers() {
  const lines = editor.value.split('\n').length;
  lineNumbers.innerHTML = Array.from({ length: lines }, (_, i) => i + 1).join('<br>');
}

function getConfig() {
  try {
    return JSON.parse(editor.value);
  } catch (e) {
    return null;
  }
}

function validateAndUpdate() {
  const config = getConfig();
  const statusEl = document.getElementById('validationStatus');
  const entityEl = document.getElementById('entityCount');
  const apiEl = document.getElementById('apiCount');

  if (!config) {
    statusEl.innerHTML = `<i class="fas fa-times-circle" style="color:var(--danger);margin-right:3px;"></i>${t('invalidJson')}`;
    statusEl.style.color = 'var(--danger)';
    entityEl.textContent = 'Entities: 0';
    apiEl.textContent = 'APIs: 0';
    return;
  }

  const issues = validateConfig(config);
  if (issues.length > 0) {
    statusEl.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:var(--warning);margin-right:3px;"></i>${issues.length} ${t('validationError').toLowerCase()}(s)`;
    statusEl.style.color = 'var(--warning)';
    issues.forEach(issue => showToast('warning', issue));
  } else {
    statusEl.innerHTML = `<i class="fas fa-check-circle" style="color:var(--accent);margin-right:3px;"></i>Valid`;
    statusEl.style.color = 'var(--accent)';
  }

  const entityCount = (config.entities || []).length;
  const apiCount = entityCount * 5;
  entityEl.textContent = `Entities: ${entityCount}`;
  apiEl.textContent = `APIs: ${apiCount}`;
}

function validateConfig(config) {
  const issues = [];
  if (!config.app || !config.app.name) {
    issues.push(t('missingFields') + ': app.name');
  }
  if (!config.entities || !Array.isArray(config.entities)) {
    issues.push(t('missingFields') + ': entities array');
  } else {
    config.entities.forEach((entity, idx) => {
      if (!entity.name) issues.push(`Entity ${idx}: ${t('missingFields')} name`);
      if (!entity.fields || !Array.isArray(entity.fields)) {
        issues.push(`Entity ${entity.name || idx}: missing fields`);
      } else {
        const hasPrimary = entity.fields.some(f => f.constraints && f.constraints.includes('primary'));
        if (!hasPrimary) issues.push(`Entity ${entity.name}: no primary key`);
        entity.fields.forEach(field => {
          if (field.reference && !field.reference.includes('.')) {
            issues.push(`${entity.name}.${field.name}: ${t('inconsistentSchema')} "${field.reference}"`);
          }
        });
      }
    });
  }
  if (config.pages) {
    config.pages.forEach((page, idx) => {
      if (page.components) {
        page.components.forEach(comp => {
          const validTypes = ['heading', 'text', 'image', 'table', 'list', 'card', 'form', 'button', 'input', 'container', 'columns', 'navbar', 'tabs', 'chart'];
          if (!validTypes.includes(comp.type)) {
            issues.push(`Page "${page.name}": ${t('unknownComponent')} "${comp.type}"`);
          }
        });
      }
    });
  }
  return issues;
}

      Invalid JSON configuration
    </div>`;
    return;
  }

  let html = '';
  const pages = config.pages || [];
  const activePage = pages[0];

  if (activePage) {
    html += renderPage(activePage, config);
  } else {
    html += `<div style="padding:40px;text-align:center;color:#666;">
      <i class="fas fa-file-alt" style="font-size:32px;margin-bottom:12px;display:block;"></i>
      No pages defined in configuration

      html += `<button onclick="this.parentElement.parentElement.querySelector('.page-content').innerHTML=document.getElementById('previewFrame').querySelector('.page-content').innerHTML" style="padding:4px 12px;border-radius:6px;border:1px solid ${i===0?'#00c080':'#ddd'};background:${i===0?'#e8faf4':'white'};color:${i===0?'#00a070':'#666'};font-size:12px;font-weight:500;cursor:pointer;">${p.name}</button>`;

function renderPage(page, config) {
  let html = `<div class="page-content" style="padding:24px;">`;

    page.components.forEach(comp => {
      html += renderComponent(comp, config);
    });
  }
  html += `</div>`;
  return html;
}

function renderComponent(comp, config) {
  const p = comp.props || {};
  switch (comp.type) {
    case 'heading': {
      const sizes = { 1: '28px', 2: '22px', 3: '18px' };
      return `<div style="margin-bottom:16px;"><h${p.level||1} style="font-size:${sizes[p.level]||'28px'};font-weight:700;color:#1a1a2e;margin:0;">${p.text||'Heading'}</h${p.level||1}></div>`;
    }
    case 'text':
      return `<p style="color:#555;font-size:14px;line-height:1.6;margin-bottom:12px;">${p.text||'Text content'}</p>`;
    case 'card': {
      const colors = ['#00c080','#ff6b4a','#6b8aff','#ffaa22','#c084fc'];
      const c = colors[Math.abs(hashCode(p.title||'')) % colors.length];
      return `<div style="background:white;border:1px solid #eee;border-radius:12px;padding:20px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
        <div style="font-size:12px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">${p.title||'Card'}</div>
        <div style="font-size:32px;font-weight:700;color:${c};">${Math.floor(Math.random()*50+10)}</div>
        <div style="font-size:11px;color:#aaa;margin-top:4px;">${p.source||''} ${p.aggregate||''}</div>
      </div>`;
    }
    case 'columns': {
      const count = p.count || 2;
      let children = '';
      if (comp.children) {
        comp.children.forEach(child => { children += renderComponent(child, config); });
      }
      return `<div style="display:grid;grid-template-columns:repeat(${count},1fr);gap:12px;margin-bottom:16px;">${children}</div>`;
    }
    case 'table': {
      const cols = p.columns || [];
      const sampleData = generateSampleData(p.source, cols, config, 5);
      return `<div style="background:white;border:1px solid #eee;border-radius:12px;overflow:hidden;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
        <div style="padding:16px 20px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:between;">
          <span style="font-weight:600;font-size:15px;color:#1a1a2e;">${p.source||'Table'}</span>
          <div style="flex:1;"></div>
          <button style="padding:6px 14px;background:#00c080;color:white;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">+ Add New</button>
        </div>
        <div style="overflow-x:auto;">
          <table style="width:100%;border-collapse:collapse;font-size:13px;">
            <thead><tr style="background:#f8f9fa;">
              ${cols.map(c => `<th style="padding:10px 16px;text-align:left;font-weight:600;color:#555;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">${c}</th>`).join('')}
              <th style="padding:10px 16px;text-align:right;font-weight:600;color:#555;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">Actions</th>
            </tr></thead>
            <tbody>${sampleData.map(row => `
              <tr style="border-top:1px solid #f0f0f0;">
                ${cols.map(c => `<td style="padding:10px 16px;color:#333;">${row[c] || '-'}</td>`).join('')}
                <td style="padding:10px 16px;text-align:right;">
                  <button style="padding:4px 8px;border:1px solid #ddd;border-radius:4px;background:white;color:#666;font-size:11px;cursor:pointer;margin-right:4px;">Edit</button>
                  <button style="padding:4px 8px;border:1px solid #ffcccc;border-radius:4px;background:white;color:#ff4444;font-size:11px;cursor:pointer;">Delete</button>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
    }
    case 'form': {
      const fields = p.fields || [];
      return `<div style="background:white;border:1px solid #eee;border-radius:12px;padding:24px;max-width:600px;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
        <form onsubmit="return false;">
          ${fields.map(f => `
            <div style="margin-bottom:16px;">
              <label style="display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:6px;">${f}</label>
              <input type="text" placeholder="Enter ${f}" style="width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;transition:border-color 0.15s;" onfocus="this.style.borderColor='#00c080'" onblur="this.style.borderColor='#ddd'">
            </div>`).join('')}
          <button type="submit" style="padding:10px 24px;background:#00c080;color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">${p.submitText || 'Submit'}</button>
        </form>
      </div>`;
    }
    case 'chart': {
      const statuses = ['todo', 'in_progress', 'done'];
      const values = [12, 8, 23];
      const maxVal = Math.max(...values);
      const colors = ['#6b8aff', '#ffaa22', '#00c080'];
      return `<div style="background:white;border:1px solid #eee;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
        <div style="font-weight:600;font-size:15px;color:#1a1a2e;margin-bottom:16px;">Tasks by Status</div>
        <div style="display:flex;align-items:flex-end;gap:20px;height:180px;padding-top:20px;">
          ${statuses.map((s, i) => `
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;">
              <span style="font-size:14px;font-weight:700;color:${colors[i]};">${values[i]}</span>
              <div style="width:100%;max-width:60px;background:${colors[i]};border-radius:6px 6px 0 0;height:${(values[i]/maxVal)*140}px;transition:height 0.5s ease;"></div>
              <span style="font-size:11px;color:#888;font-weight:500;">${s.replace('_',' ')}</span>
            </div>`).join('')}
        </div>
      </div>`;
    }
    case 'button':
      return `<button style="padding:10px 20px;background:${p.color||'#00c080'};color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:12px;">${p.text||'Button'}</button>`;
    case 'image':
      return `<img src="${p.src||'https://picsum.photos/seed/metaforge/600/300.jpg'}" alt="${p.alt||''}" style="width:100%;border-radius:12px;margin-bottom:12px;object-fit:cover;max-height:300px;">`;
    default:
      return `<div style="padding:12px;border:1px dashed #ddd;border-radius:8px;color:#999;font-size:13px;margin-bottom:12px;"><i class="fas fa-question-circle" style="margin-right:6px;"></i>Unknown: ${comp.type}</div>`;
  }
}

function hashCode(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash |= 0;
  }
  return hash;
}

function generateSampleData(source, cols, config, count) {
  const entity = (config.entities || []).find(e => e.name === source);
  const samples = {
    title: ['Design homepage', 'Fix login bug', 'Write API docs', 'Setup CI/CD', 'Review PRs', 'Update dependencies', 'Add tests', 'Refactor auth'],
    priority: ['low', 'medium', 'high', 'critical'],
    status: ['todo', 'in_progress', 'done'],
    dueDate: ['2025-02-15', '2025-02-20', '2025-03-01', '2025-03-10', '2025-02-28'],
    email: ['alice@example.com', 'bob@example.com', 'carol@example.com', 'dave@example.com', 'eve@example.com'],
    name: ['Alice Johnson', 'Bob Smith', 'Carol White', 'Dave Brown', 'Eve Davis'],
    role: ['admin', 'user'],
    description: ['Implement new feature', 'Bug fix required', 'Documentation update', 'Performance optimization', 'Security patch'],
    createdAt: ['2025-01-15', '2025-01-20', '2025-02-01', '2025-02-10', '2025-02-14']
  };
  const rows = [];
  for (let i = 0; i < count; i++) {
    const row = {};
    cols.forEach(col => {
      const options = samples[col];
      if (options) {
        row[col] = options[i % options.length];
      } else {
        row[col] = `${col}_${i+1}`;
      }
    });
    rows.push(row);
  }
  return rows;
}

        </div>
        <div>

      </div>

          <div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:8px;">${t('csvPreview')}</div>
          <div id="csvPreviewTable" style="max-height:200px;overflow:auto;border:1px solid var(--border);border-radius:8px;"></div>
        </div>

      </div>
    </div>
  </div>`;

  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('drag-over'); });
  dropZone.addEventListener('drop', (e) => {

function closeCSVModal() {
  document.getElementById('csvModal').style.display = 'none';
  csvData = null;
}

function handleCSVFile(e) {
  if (e.target.files.length) processCSV(e.target.files[0]);
}

function processCSV(file) {
  if (!file.name.endsWith('.csv')) {
    showToast('error', 'Please upload a .csv file');
    return;
  }
  document.getElementById('statusText').textContent = t('csvParsing');

  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    const lines = text.split('\n').filter(l => l.trim());
    if (lines.length < 2) {
      showToast('error', 'CSV file is empty or has no data rows');
      return;
    }

    const headers = parseCSVLine(lines[0]);
    const rows = lines.slice(1).map(l => parseCSVLine(l));

    csvData = { headers, rows, fileName: file.name };
    document.getElementById('statusText').textContent = 'Ready';

    // Show preview
    const previewArea = document.getElementById('csvPreviewArea');
    previewArea.style.display = 'block';
    const previewTable = document.getElementById('csvPreviewTable');
    let tableHtml = `<table style="width:100%;border-collapse:collapse;font-size:12px;">
      <thead><tr style="background:var(--bg-tertiary);position:sticky;top:0;">
        ${headers.map(h => `<th style="padding:8px 12px;text-align:left;font-weight:600;color:var(--text-secondary);border-bottom:1px solid var(--border);white-space:nowrap;">${h}</th>`).join('')}
      </tr></thead><tbody>`;
    rows.slice(0, 10).forEach(row => {
      tableHtml += `<tr>${headers.map((h, i) => `<td style="padding:6px 12px;border-bottom:1px solid rgba(42,42,58,0.5);color:var(--text-primary);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;">${row[i]||''}</td>`).join('')}</tr>`;
    });
    if (rows.length > 10) {
      tableHtml += `<tr><td colspan="${headers.length}" style="padding:8px 12px;text-align:center;color:var(--text-muted);font-style:italic;">... and ${rows.length-10} more rows</td></tr>`;
    }
    tableHtml += `</tbody></table>`;
    previewTable.innerHTML = tableHtml;

    // Enable generate button
    const btn = document.getElementById('csvGenerateBtn');
    btn.disabled = false;
    btn.style.opacity = '1';

    showToast('success', `Parsed ${rows.length} rows with ${headers.length} columns`);
  };
  reader.readAsText(file);
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    if (char === '"') { inQuotes = !inQuotes; }
    else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
    else { current += char; }
  }
  result.push(current.trim());
  return result;
}

function generateFromCSV() {
  if (!csvData) return;

  document.getElementById('statusText').textContent = t('csvGenerating');
  const btn = document.getElementById('csvGenerateBtn');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:6px;"></i>' + t('csvGenerating');
  btn.disabled = true;

  setTimeout(() => {
    const entityName = csvData.fileName.replace('.csv', '').replace(/[^a-zA-Z]/g, ' ').trim().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join('');

    const typeMap = {
      'id': 'uuid', 'email': 'string', 'name': 'string', 'title': 'string',
      'description': 'text', 'phone': 'string', 'date': 'date', 'created': 'datetime',
      'updated': 'datetime', 'price': 'float', 'amount': 'float', 'quantity': 'integer',
      'count': 'integer', 'status': 'enum', 'type': 'enum', 'priority': 'enum',
      'active': 'boolean', 'enabled': 'boolean', 'url': 'string', 'image': 'string'
    };

    const fields = csvData.headers.map((h, i) => {
      const lower = h.toLowerCase().replace(/[^a-z]/g, '');
      let type = typeMap[lower] || 'string';
      let constraints = [];
      if (lower.includes('id') && i === 0) constraints = ['primary', 'auto'];
      if (lower.includes('email')) constraints.push('unique');
      if (type === 'enum') {
        const uniqueVals = [...new Set(csvData.rows.map(r => r[i]).filter(v => v))];
        if (uniqueVals.length > 0 && uniqueVals.length <= 10) {
          return { name: h, type, options: uniqueVals, default: uniqueVals[0], constraints };
        }
        type = 'string';
      }
      return { name: h, type, constraints };
    });

    // Ensure there's a primary key
    if (!fields.some(f => f.constraints.includes('primary'))) {
      fields.unshift({ name: 'id', type: 'uuid', constraints: ['primary', 'auto'] });
    }
    // Ensure timestamps
    if (!fields.some(f => f.name.toLowerCase().includes('created'))) {
      fields.push({ name: 'createdAt', type: 'datetime', constraints: ['auto'] });
    }

    const newConfig = {
      app: {
        name: entityName + ' Manager',
        version: '1.0.0',
        description: `Auto-generated from ${csvData.fileName}`
      },
      entities: [{
        name: entityName,
        fields: fields
      }],
      pages: [
        {
          name: 'Dashboard',
          path: '/',
          layout: 'dashboard',
          components: [
            { type: 'heading', props: { text: entityName + ' Dashboard', level: 1 } },
            { type: 'columns', props: { count: 3 }, children: [
              { type: 'card', props: { title: 'Total Records', source: entityName, aggregate: 'count' } },
              { type: 'card', props: { title: 'Recent Additions', source: entityName, aggregate: 'count', filter: { recent: true } } },
              { type: 'card', props: { title: 'Fields', source: entityName, aggregate: 'fields' } }
            ]},
            { type: 'table', props: { source: entityName, columns: fields.filter(f=>!['id','createdAt'].includes(f.name)).map(f=>f.name), actions: ['edit', 'delete'] } }
          ]
        },
        {
          name: 'Add ' + entityName,
          path: '/new',
          layout: 'form',
          components: [
            { type: 'heading', props: { text: 'Add ' + entityName, level: 1 } },
            { type: 'form', props: { source: entityName, submitText: 'Create ' + entityName, fields: fields.filter(f=>!['id','createdAt'].includes(f.name)).map(f=>f.name) } }
          ]
        }
      ],
      workflows: [
        { name: entityName + ' Created', trigger: entityName + '.onCreate', actions: ['sendNotification', 'logActivity'] },
        { name: entityName + ' Updated', trigger: entityName + '.onUpdate', actions: ['logActivity'] }
      ]
    };

    editor.value = JSON.stringify(newConfig, null, 2);
    updateLineNumbers();
    validateAndUpdate();
    closeCSVModal();
    switchTab('editor');
    addNotification('success', t('notifCSVImported') + `: ${csvData.rows.length} rows from ${csvData.fileName}`);
    showToast('success', `Generated ${entityName} app with ${fields.length} fields`);
    document.getElementById('statusText').textContent = 'Ready';
  }, 1200);
}

function handleAuth() {

    return;

  document.getElementById('authModal').style.display = 'none';
  addNotification('success', `${authMode === 'login' ? 'Signed in' : 'Signed up'} as ${email}`);
  showToast('success', `Welcome${authMode === 'login' ? ' back' : ''}, ${email.split('@')[0]}!`);
}

function socialLogin(provider) {

function deployApp() {
  const config = getConfig();
  if (!config) {
    showToast('error', 'Fix JSON errors before deploying');
    return;
  }

  const issues = validateConfig(config);
  if (issues.length > 0) {
    showToast('warning', 'Fix validation errors before deploying');
    return;
  }

  const modal = document.getElementById('deployModal');
  modal.style.display = 'block';
  const slug = (config.app?.name || 'my-app').toLowerCase().replace(/[^a-z0-9]/g, '-');
  modal.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)document.getElementById('deployModal').style.display='none'">
    <div class="modal-content glass" style="width:480px;max-width:90vw;border-radius:16px;overflow:hidden;">
      <div style="padding:24px;">
        <div style="text-align:center;margin-bottom:24px;">
          <div style="width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#00a070);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;animation:pulse-glow 2s ease infinite;">
            <i class="fas fa-rocket" style="font-size:24px;color:var(--bg-primary);"></i>
          </div>
          <h2 style="font-size:20px;font-weight:700;margin-bottom:4px;">${t('deployTitle')}</h2>
          <p style="font-size:13px;color:var(--text-muted);">${t('deployDesc')}</p>
        </div>

        <div style="background:var(--bg-tertiary);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:20px;">
          <div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">${t('deployUrl')}</div>
          <div class="mono" style="font-size:14px;color:var(--accent);word-break:break-all;">https://{slug}.metaforge.app</div>
        </div>

        <div id="deployProgress" style="display:none;margin-bottom:20px;">
          <div style="display:flex;flex-direction:column;gap:8px;" id="deploySteps"></div>
        </div>

        <div style="display:flex;gap:8px;">
          <button id="deployCloseBtn" onclick="document.getElementById('deployModal').style.display='none'" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text-secondary);font-size:13px;cursor:pointer;">${t('deployClose')}</button>
          <button id="deployNowBtn" onclick="executeDeploy()" style="flex:2;padding:10px;border-radius:8px;border:none;background:var(--accent);color:var(--bg-primary);font-size:13px;font-weight:700;cursor:pointer;">${t('deployBtn')}</button>
        </div>
      </div>
    </div>
  </div>`;

  // Fix the URL display
  modal.querySelector('.mono').textContent = `https://${slug}.metaforge.app`;
}

function executeDeploy() {
  const btn = document.getElementById('deployNowBtn');
  const progress = document.getElementById('deployProgress');
  const steps = document.getElementById('deploySteps');
  btn.disabled = true;
  btn.style.opacity = '0.5';
  btn.innerHTML = `<i class="fas fa-spinner fa-spin" style="margin-right:6px;"></i>${t('deploying')}`;
  progress.style.display = 'block';

  const deploySteps = [
    { text: 'Validating configuration...', icon: 'fa-check-circle', time: 600 },
    { text: 'Creating database schema...', icon: 'fa-database', time: 1000 },
    { text: 'Generating API endpoints...', icon: 'fa-plug', time: 800 },
    { text: 'Compiling frontend...', icon: 'fa-code', time: 1200 },
    { text: 'Setting up workflows...', icon: 'fa-sitemap', time: 600 },
    { text: 'Deploying to production...', icon: 'fa-rocket', time: 1500 }
  ];

  let i = 0;
  function nextStep() {
    if (i >= deploySteps.length) {
      btn.innerHTML = `<i class="fas fa-check" style="margin-right:6px;"></i>${t('deploySuccess')}`;
      btn.style.background = 'var(--accent)';
      btn.style.opacity = '1';
      addNotification('success', t('notifDeployed'));
      showToast('success', 'App is live!');
      return;
    }
    const step = deploySteps[i];
    const stepEl = document.createElement('div');
    stepEl.style.cssText = 'display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary);';
    stepEl.innerHTML = `<i class="fas fa-spinner fa-spin" style="color:var(--accent);font-size:12px;width:16px;text-align:center;"></i><span>${step.text}</span>`;
    steps.appendChild(stepEl);

    setTimeout(() => {
      stepEl.innerHTML = `<i class="fas fa-check-circle" style="color:var(--accent);font-size:12px;width:16px;text-align:center;"></i><span style="color:var(--text-primary);">${step.text}</span>`;
      i++;
      nextStep();
    }, step.time);
  }
  nextStep();
}

// =============================================
// DRAG & DROP COMPONENTS INTO EDITOR
// =============================================
document.querySelectorAll('.component-item').forEach(item => {
  item.addEventListener('dragstart', (e) => {
    e.dataTransfer.setData('text/plain', JSON.stringify({ type: item.dataset.type }));
  });
});

editor.addEventListener('dragover', (e) => { e.preventDefault(); });
editor.addEventListener('drop', (e) => {
  e.preventDefault();
  try {
    const data = JSON.parse(e.dataTransfer.getData('text/plain'));
    const config = getConfig();
    if (config && config.pages && config.pages[0] && config.pages[0].components) {
      config.pages[0].components.push({ type: data.type, props: {} });
      editor.value = JSON.stringify(config, null, 2);
      updateLineNumbers();
      validateAndUpdate();
      showToast('info', `Added ${data.type} component`);
    }
  } catch (err) {}
});

  { type: 'info', message: t('notifSchemaCreated'), time: new Date(Date.now() - 60000) },
  { type: 'info', message: t('notifApisReady'), time: new Date(Date.now() - 30000) }
];

// Close panels on outside click
document.addEventListener('click', (e) => {
  const notifPanel = document.getElementById('notifPanel');
  const notifBtn = e.target.closest('button[onclick="toggleNotifications()"]');
  if (!notifBtn && !notifPanel.contains(e.target)) {
    notifPanel.style.display = 'none';
  }
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    validateAndUpdate();
    showToast('success', 'Configuration validated');
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    switchTab('preview');
  }
  if (e.key === 'Escape') {
    document.getElementById('csvModal').style.display = 'none';
    document.getElementById('authModal').style.display = 'none';
    document.getElementById('deployModal').style.display = 'none';
    document.getElementById('notifPanel').style.display = 'none';
  }
});
